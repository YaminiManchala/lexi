<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DetectThreats</title>
    <style>
        :root {
            --bg: #0b1220;
            --bg-soft: #111a2e;
            --card: rgba(17, 26, 46, 0.92);
            --card-border: rgba(148, 163, 184, 0.16);
            --text: #e5eefc;
            --muted: #9fb0cc;
            --accent: #5b8cff;
            --accent-2: #6ee7ff;
            --danger: #ff6b6b;
            --success: #2dd4bf;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
            --radius: 24px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(91, 140, 255, 0.22), transparent 28%),
                radial-gradient(circle at top right, rgba(110, 231, 255, 0.16), transparent 24%),
                linear-gradient(180deg, #08111f 0%, #0b1220 100%);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 10;
            backdrop-filter: blur(18px);
            background: rgba(8, 17, 31, 0.72);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
        }

        .navbar-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .brand-badge {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: #08111f;
            font-weight: 900;
            box-shadow: 0 10px 30px rgba(91, 140, 255, 0.35);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }

        .brand-text span:first-child {
            font-size: 1rem;
        }

        .brand-text span:last-child {
            font-size: 0.82rem;
            color: var(--muted);
            font-weight: 500;
        }

        .nav-link {
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.12);
            color: var(--text);
            transition: 0.2s ease;
        }

        .nav-link:hover {
            transform: translateY(-1px);
            border-color: rgba(91, 140, 255, 0.4);
            background: rgba(91, 140, 255, 0.12);
        }

        .container {
            max-width: 1180px;
            margin: 0 auto;
            padding: 34px 24px 60px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .muted {
            color: var(--muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 0;
            border-radius: 16px;
            padding: 14px 20px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            color: #08111f;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 14px 30px rgba(91, 140, 255, 0.28);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
        }

        .btn-ghost {
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .grid {
            display: grid;
            gap: 18px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
        }

        .summary-item {
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        .summary-item .label {
            font-size: 0.84rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .summary-item .value {
            font-size: 1.02rem;
            font-weight: 700;
            word-break: break-word;
        }

        .panel {
            padding: 24px;
        }

        .section-title {
            margin: 0 0 14px;
            font-size: 1.05rem;
        }

        .codebox {
            margin: 0;
            padding: 20px;
            border-radius: 20px;
            background: #08111f;
            border: 1px solid rgba(148, 163, 184, 0.14);
            overflow: auto;
            color: #dbe7ff;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .alert {
            padding: 16px 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 107, 107, 0.26);
            background: rgba(255, 107, 107, 0.08);
            color: #ffd8d8;
        }

        @media (max-width: 900px) {
            .summary-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 640px) {
            .navbar-inner, .container {
                padding-left: 16px;
                padding-right: 16px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .brand-text span:last-child {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <a href="{% url 'home' %}" class="brand">
                <div class="brand-badge">DT</div>
                <div class="brand-text">
                    <span>DetectThreats</span>
                    <span>Intelligent Web Vulnerability Analysis</span>
                </div>
            </a>

            <nav>
                <a href="{% url 'home' %}" class="nav-link">Home</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
